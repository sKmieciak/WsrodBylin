<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f0fdf4"/>
  <g transform="translate(200,200)">
    <!-- łodyga -->
    <line x1="0" y1="80" x2="0" y2="-20" stroke="#86efac" stroke-width="8" stroke-linecap="round"/>
    <!-- liść lewy -->
    <path d="M0,20 Q-70,-10 -50,-70 Q-20,-30 0,20" fill="#4ade80" opacity="0.85"/>
    <!-- liść prawy -->
    <path d="M0,20 Q70,-10 50,-70 Q20,-30 0,20" fill="#22c55e" opacity="0.85"/>
    <!-- liść górny -->
    <path d="M0,-20 Q-30,-90 0,-110 Q30,-90 0,-20" fill="#16a34a" opacity="0.9"/>
    <!-- doniczka -->
    <path d="M-35,80 Q-40,120 40,120 Q40,120 35,80 Z" fill="#d1d5db"/>
    <rect x="-40" y="75" width="80" height="12" rx="4" fill="#9ca3af"/>
  </g>
</svg>
